<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>INOUT CONTROL PANEL</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div id="panel-login">
      <div class="login-logo">InOut<span class="logo-dot">.</span></div>
      <div class="login-sub">Portal del equipo · InOut Media</div>
      <div id="login-error" style="display:none;background:rgba(255,60,172,.1);border:1px solid rgba(255,60,172,.2);color:var(--a2);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;"></div>
      <label class="form-lbl">Email</label>
      <input class="form-input" id="login-email" type="email" placeholder="tu@noctua.es" autocomplete="email"/>
      <label class="form-lbl">Contraseña</label>
      <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      <button class="btn btn-p btn-full" id="login-btn" onclick="doLogin()" style="font-size:15px;padding:12px">Entrar al portal</button>
      <div style="margin-top:10px;text-align:center">
        <span style="font-size:12px;color:var(--a3);cursor:pointer;text-decoration:underline" onclick="mostrarPanelReset()">¿Olvidaste tu contraseña?</span>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted);text-align:center">¿Sin acceso? Contacta con el administrador</div>
    </div>
    <div id="panel-reset" style="display:none">
      <div class="login-logo">InOut<span class="logo-dot">.</span></div>
      <div class="login-sub" style="margin-bottom:20px">Recuperar contraseña</div>
      <div id="reset-msg" style="display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;"></div>
      <label class="form-lbl">Tu email</label>
      <input class="form-input" id="reset-email" type="email" placeholder="tu@noctua.es"/>
      <button class="btn btn-p btn-full" onclick="enviarResetEmail()" style="font-size:15px;padding:12px">Enviar enlace</button>
      <div style="margin-top:10px;text-align:center">
        <span style="font-size:12px;color:var(--a3);cursor:pointer;text-decoration:underline" onclick="mostrarPanelLogin()">← Volver al inicio de sesión</span>
      </div>
    </div>
  </div>
</div>
  
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 { margin-bottom: 20px; }

select, button {
  padding: 10px;
  border-radius: 8px;
  margin-right: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}

.card.updated {
  transform: scale(1.03);
  background: #334155;
}

.big {
  font-size: 28px;
  font-weight: bold;
}

table {
  width: 100%;
  margin-top: 20px;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

canvas {
  margin-top: 30px;
}
</style>
</head>

<body>

<h1>💰 INOUT CONTROL PANEL</h1>

<select id="eventFilter"></select>
<button onclick="exportPDF()">📄 Descargar PDF</button>

<div class="grid">
  <div class="card"><h3>Total</h3><div id="total" class="big">0€</div></div>
  <div class="card"><h3>Hoy</h3><div id="today" class="big">0</div></div>
  <div class="card"><h3>Media</h3><div id="avg" class="big">0€</div></div>
</div>

<div class="card">
  <h3>🏷️ Kioscos</h3>
  <div id="kiosks"></div>
</div>

<div class="card">
  <h3>🧾 Transacciones</h3>
  <table>
    <thead>
      <tr>
        <th>Hora</th>
        <th>Kiosco</th>
        <th>Importe</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<canvas id="chart"></canvas>

<script>
const client = supabase.createClient(
  "https://raoxkjnwrccoxjcipfpv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhb3hram53cmNjb3hqY2lwZnB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzMxNzgsImV4cCI6MjA5MTgwOTE3OH0.dlPG4hpA-ypmGkqrP0ohaiOfMtXq5dpVmV7QNOt7_Qs"
);

let chart;

// CARGAR EVENTOS
async function cargarEventos() {
  const { data } = await client.from("transactions").select("event_id");

  const unique = [...new Set(data.map(d => d.event_id))];

  const select = document.getElementById("eventFilter");
  select.innerHTML = `<option value="all">Todos</option>`;

  unique.forEach(e => {
    select.innerHTML += `<option value="${e}">${e}</option>`;
  });
}

// CARGAR DATOS
async function cargarDatos() {

  const event = document.getElementById("eventFilter").value;

  let query = client.from("transactions").select("*");

  if (event !== "all") {
    query = query.eq("event_id", event);
  }

  const { data } = await query.order("created_at", { ascending: false });

  let total = 0;
  let todayCount = 0;
  let kiosks = {};

  const today = new Date().toISOString().split("T")[0];

  data.forEach(t => {
    total += Number(t.total);

    if (t.created_at.startsWith(today)) todayCount++;

    kiosks[t.kiosk_id] = (kiosks[t.kiosk_id] || 0) + Number(t.total);
  });

  const avg = data.length ? total / data.length : 0;

  document.getElementById("total").innerText = total.toFixed(2) + "€";
  document.getElementById("today").innerText = todayCount;
  document.getElementById("avg").innerText = avg.toFixed(2) + "€";

  // kioscos
  let kiosksHTML = "";
  Object.entries(kiosks)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([k,v])=>{
      kiosksHTML += `<div>${k}: ${v.toFixed(2)}€</div>`;
    });

  document.getElementById("kiosks").innerHTML = kiosksHTML;

  // tabla
  let tableHTML = "";
  data.slice(0,10).forEach(t=>{
    const time = new Date(t.created_at).toLocaleTimeString();

    tableHTML += `
      <tr>
        <td>${time}</td>
        <td>${t.kiosk_id}</td>
        <td>${t.amount}€</td>
        <td>${t.total}€</td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = tableHTML;

  generarGrafica(data);
  animar();
}

// GRÁFICA
function generarGrafica(data) {
  const horas = {};

  data.forEach(t=>{
    const h = new Date(t.created_at).getHours();
    horas[h] = (horas[h]||0)+Number(t.total);
  });

  const labels = Object.keys(horas);
  const values = Object.values(horas);

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Ventas (€)",
        data: values
      }]
    }
  });
}

// PDF
function exportPDF() {
  html2canvas(document.body).then(canvas=>{
    const img = canvas.toDataURL("image/png");
const { jsPDF } = window.jspdf;
const pdf = new jsPDF();    pdf.addImage(img,'PNG',0,0);
    pdf.save("report.pdf");
  });
}

// ANIMACIÓN
function animar(){
  document.querySelectorAll(".card").forEach(c=>{
    c.classList.add("updated");
    setTimeout(()=>c.classList.remove("updated"),300);
  });
}

// INIT
document.getElementById("eventFilter").addEventListener("change", cargarDatos);

cargarEventos();
cargarDatos();
setInterval(cargarDatos, 5000);
</script>

</body>
</html>
