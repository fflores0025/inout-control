<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#07070f"/>
  <title>InOut Control · Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#07070f;--surf:#0d0d1a;--card:#111120;--border:#1c1c2e;
      --a1:#c8ff00;--a2:#ff3cac;--a3:#00d4ff;
      --txt:#e6e6f0;--muted:#60607a;--r:14px;
      --success:#00e676;--danger:#ff1744;--warn:#ffab00;
      --sidebar:240px;
    }
    html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);background:var(--bg);overflow-x:hidden;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
    #app{display:flex;min-height:100vh;}
    .sidebar{width:var(--sidebar);height:100vh;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;}
    .main-area{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
    .topbar{height:56px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;}
    .main-content{flex:1;padding:24px;max-width:1400px;width:100%;margin:0 auto;}
    .s-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}
    .logo-dot{color:var(--a1);}
    .s-logo small{display:block;font-family:'DM Sans',sans-serif;font-weight:400;font-size:10px;color:var(--a2);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px;}
    .nav{flex:1;padding:8px 0;overflow-y:auto;}
    .nav-sec{padding:10px 18px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;color:var(--muted);transition:all .15s;font-size:13px;border-left:2px solid transparent;}
    .nav-item:hover{color:var(--txt);background:rgba(255,255,255,.03);}
    .nav-item.active{color:var(--a1);border-left-color:var(--a1);background:rgba(200,255,0,.05);}
    .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
    .s-bottom{padding:14px 18px;border-top:1px solid var(--border);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .15s;white-space:nowrap;}
    .btn:active{opacity:.8;}
    .btn-p{background:var(--a1);color:#000;}
    .btn-g{background:transparent;color:var(--muted);border:1px solid var(--border);}
    .btn-g:hover{color:var(--txt);border-color:var(--muted);}
    .btn-danger{background:rgba(255,23,68,.1);color:var(--danger);border:1px solid rgba(255,23,68,.2);}
    .btn-full{width:100%;justify-content:center;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
    .card-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;}
    .stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;}
    .stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
    .stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;letter-spacing:-1px;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
    .mb16{margin-bottom:16px;}.mb24{margin-bottom:24px;}
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
    .b-green{background:rgba(0,230,118,.12);color:var(--success);}
    .b-red{background:rgba(255,23,68,.12);color:var(--danger);}
    .b-blue{background:rgba(0,212,255,.12);color:var(--a3);}
    .b-gray{background:rgba(107,107,136,.15);color:var(--muted);}
    .b-warn{background:rgba(255,171,0,.12);color:var(--warn);}
    .b-pink{background:rgba(255,60,172,.12);color:var(--a2);}
    .tbl-wrap{overflow-x:auto;border-radius:8px;}
    table{width:100%;border-collapse:collapse;}
    thead th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
    tbody td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover td{background:rgba(255,255,255,.02);}
    .form-lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block;}
    .form-input,.form-select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;margin-bottom:14px;}
    .form-input:focus,.form-select:focus{border-color:var(--a1);}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);z-index:900;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.show{display:flex;}
    .modal-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px;}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:1000;transition:transform .3s;white-space:nowrap;}
    #toast.show{transform:translateX(-50%) translateY(0);}
    .device-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:border-color .2s;}
    .device-card.online{border-color:rgba(0,230,118,.25);box-shadow:0 0 0 1px rgba(0,230,118,.1);}
    .device-card.offline{opacity:.7;}
    .device-status{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .device-status.on{background:var(--success);box-shadow:0 0 6px rgba(0,230,118,.5);}
    .device-status.off{background:var(--muted);}
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse 50% 35% at 50% 0%,rgba(255,60,172,.08) 0%,transparent 60%);}
    .login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:36px 32px;}
    
    .device-panel{
      position:fixed;
      top:0;
      right:-420px;
      width:420px;
      height:100vh;
      background:var(--surf);
      border-left:1px solid var(--border);
      z-index:500;
      transition:right .3s;
      display:flex;
      flex-direction:column;
      box-shadow:-4px 0 20px rgba(0,0,0,.3);
    }
    .device-panel.open{right:0;}
    .device-panel-header{
      padding:18px 20px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      background:var(--card);
    }
    .device-panel-close{
      width:32px;
      height:32px;
      border-radius:50%;
      background:transparent;
      border:1px solid var(--border);
      color:var(--muted);
      font-size:18px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all .15s;
    }
    .device-panel-close:hover{background:var(--bg);color:var(--txt);}
    .device-panel-tabs{
      display:flex;
      padding:0 20px;
      border-bottom:1px solid var(--border);
      background:var(--card);
      gap:4px;
    }
    .device-panel-tab{
      padding:12px 16px;
      cursor:pointer;
      color:var(--muted);
      font-size:12px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:.5px;
      border-bottom:2px solid transparent;
      transition:all .15s;
    }
    .device-panel-tab:hover{color:var(--txt);}
    .device-panel-tab.active{color:var(--a1);border-bottom-color:var(--a1);}
    .device-panel-content{
      flex:1;
      overflow-y:auto;
      padding:20px;
    }
    
    @media(max-width:768px){
      :root{--sidebar:100vw;}
      .sidebar{position:fixed;transform:translateX(-100%);width:100vw;transition:transform .25s;}
      .sidebar.open{transform:translateX(0);}
      .main-area{margin-left:0;}
      .g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr;}.g2{grid-template-columns:1fr;}
      .main-content{padding:14px;}
      .device-panel{width:100vw;right:-100vw;}
    }
  </style>
</head>
<body>
<div id="toast"></div>
<div class="modal-overlay" id="modal-overlay"><div class="modal-box" id="modal-box"></div></div>

<div class="device-panel" id="device-panel">
  <div class="device-panel-header">
    <div>
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:16px" id="dp-device-name">—</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px" id="dp-device-type">—</div>
    </div>
    <button class="device-panel-close" onclick="closeDevicePanel()">✕</button>
  </div>
  <div class="device-panel-tabs">
    <div class="device-panel-tab active" onclick="switchDeviceTab('info')">📊 Info</div>
    <div class="device-panel-tab" onclick="switchDeviceTab('stats')">📈 Stats</div>
    <div class="device-panel-tab" onclick="switchDeviceTab('test')">🔧 Test</div>
    <div class="device-panel-tab" onclick="switchDeviceTab('edit')">✏️ Editar</div>
  </div>
  <div class="device-panel-content" id="device-panel-content"></div>
</div>

<div id="login-screen">
  <div class="login-card">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:24px;margin-bottom:4px">InOut<span style="color:var(--a2)">.</span> Control</div>
    <div style="color:var(--muted);font-size:12px;margin-bottom:6px">Panel de control central · InOut Media</div>
    <div style="padding:10px 14px;background:rgba(255,60,172,.06);border:1px solid rgba(255,60,172,.15);border-radius:8px;font-size:12px;color:var(--a2);margin-bottom:24px">
      🔒 Acceso exclusivo: <strong>SuperAdmin</strong> únicamente
    </div>
    <div id="login-err" style="display:none;background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.2);color:var(--danger);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px"></div>
    <label class="form-lbl">Email</label>
    <input class="form-input" id="login-email" type="email" placeholder="admin@inoutmedia.es" autocomplete="email"/>
    <label class="form-lbl">Contraseña</label>
    <input class="form-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="btn btn-p btn-full" style="padding:13px;font-size:15px;border-radius:12px" onclick="doLogin()">Entrar a Control</button>
  </div>
</div>

<div id="app" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="s-logo">InOut<span class="logo-dot">.</span> Control<small>Panel de administración</small></div>
    <nav class="nav" id="nav-items"></nav>
    <div class="s-bottom">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px" id="s-user-info">—</div>
      <button class="btn btn-g btn-full" style="padding:8px;font-size:12px" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </aside>
  <div class="main-area">
    <div class="topbar">
      <button style="background:none;border:none;color:var(--txt);font-size:22px;cursor:pointer;padding:4px;display:none" id="burger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px" id="topbar-title">Control</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:var(--a2);padding:3px 10px;border-radius:6px;background:rgba(255,60,172,.08);border:1px solid rgba(255,60,172,.15)" id="topbar-role">ADMIN</span>
        <span style="font-size:12px;color:var(--muted)" id="tb-user">—</span>
      </div>
    </div>
    <div class="main-content" id="page-content"></div>
  </div>
</div>

<script>
const SB_URL='https://raoxkjnwrccoxjcipfpv.supabase.co';
const SB_KEY='sb_publishable__-K1pC4bOJHRf8JQ__OOzg_jqLxlGla';
const _sb=supabase.createClient(SB_URL,SB_KEY);

let currentUser=null, userProfile=null, currentPage='dashboard';
let _empleados=[], _eventos=[], _orgsCache=[];
let _activeChannels = [];
let _dispositivosInterval = null;
let _currentDevice = null;
let _currentDeviceTab = 'info';
let _statsChart = null;

const NAV=[
  {sec:'Panel'},
  {key:'dashboard',icon:'⚡',label:'Dashboard'},
  {key:'dispositivos',icon:'📱',label:'Dispositivos'},
  {sec:'Gestión'},
  {key:'organizaciones',icon:'🏢',label:'Organizaciones'},
  {key:'empleados',icon:'👥',label:'Empleados'},
  {key:'eventos',icon:'🎪',label:'Eventos'},
  {key:'pulseras',icon:'📡',label:'Pulseras RFID'},
  {key:'fichajes',icon:'🕐',label:'Fichajes'},
  {sec:'Informes'},
  {key:'informes',icon:'📊',label:'Informes'},
  {key:'transacciones',icon:'💶',label:'Transacciones'},
];
const TITLES={
  dashboard:'Dashboard',
  dispositivos:'Dispositivos',
  organizaciones:'Organizaciones',
  empleados:'Empleados',
  eventos:'Eventos',
  pulseras:'Pulseras RFID',
  fichajes:'Fichajes',
  informes:'Informes',
  transacciones:'Transacciones'
};

const DEVICE_TYPES={
  valid:{label:'inout-valid',icon:'📡',url:'https://inout-valid.vercel.app',color:'var(--a3)'},
  kiosk:{label:'inout-kiosk',icon:'🎟️',url:'https://inout-kiosk.vercel.app',color:'var(--a1)'},
  register:{label:'inout-register',icon:'📝',url:'https://inout-register.vercel.app',color:'var(--a2)'},
  control:{label:'inout-control',icon:'⚙️',url:window.location.href,color:'var(--warn)'},
  staff:{label:'inout-staff',icon:'👷',url:'#',color:'var(--muted)'},
};

function toast(msg,ms=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms);}
function fmt(n){return(n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){return new Date(d).toLocaleString('es-ES',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
function minsToHHMM(m){const h=Math.floor(m/60),mn=m%60;return`${h}h ${String(mn).padStart(2,'0')}m`;}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
  document.getElementById('modal-box').innerHTML='';
  _activeChannels.forEach(ch => ch.unsubscribe());
  _activeChannels = [];
}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});

// ══════════════════════════════════════════════════════════════════════════
// PANEL LATERAL DE DISPOSITIVOS
// ══════════════════════════════════════════════════════════════════════════

function openDevicePanel(device) {
  _currentDevice = device;
  _currentDeviceTab = 'info';
  
  const tipo = DEVICE_TYPES[device.type] || {label: device.type, icon: '📱'};
  document.getElementById('dp-device-name').textContent = device.name || tipo.label;
  document.getElementById('dp-device-type').textContent = device.location || 'Sin ubicación';
  
  document.querySelectorAll('.device-panel-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.device-panel-tab')[0].classList.add('active');
  
  renderDeviceTabContent('info');
  document.getElementById('device-panel').classList.add('open');
}

function closeDevicePanel() {
  document.getElementById('device-panel').classList.remove('open');
  _currentDevice = null;
  if (_statsChart) {
    _statsChart.destroy();
    _statsChart = null;
  }
}

function switchDeviceTab(tab) {
  _currentDeviceTab = tab;
  document.querySelectorAll('.device-panel-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderDeviceTabContent(tab);
}

function renderDeviceTabContent(tab) {
  const content = document.getElementById('device-panel-content');
  const d = _currentDevice;
  if (!d) return;
  
  const tipo = DEVICE_TYPES[d.type] || {label: d.type, icon: '📱', color: 'var(--muted)'};
  const lastSeen = d.last_seen ? new Date(d.last_seen) : null;
  const isOnline = lastSeen && (Date.now() - lastSeen.getTime()) < 300000;
  
  if (tab === 'info') {
    content.innerHTML = `
      <div class="card mb16" style="text-align:center;padding:24px">
        <div style="font-size:64px;margin-bottom:12px">${tipo.icon}</div>
        <div style="font-size:18px;font-weight:700;margin-bottom:4px">${d.name || tipo.label}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">${d.location || 'Sin ubicación'}</div>
        <span class="badge ${isOnline ? 'b-green' : 'b-gray'}" style="font-size:13px;padding:6px 14px">
          ${isOnline ? '🟢 Online' : '⚫ Offline'}
        </span>
      </div>
      
      <div class="card mb16">
        <div class="card-title">Información básica</div>
        <div style="display:grid;gap:12px">
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
            <span style="color:var(--muted);font-size:12px">TIPO</span>
            <span style="font-weight:600">${tipo.label}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
            <span style="color:var(--muted);font-size:12px">POS ID</span>
            <span style="font-family:monospace;font-size:11px;color:var(--a3)">${d.pos_id || 'No asignado'}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
            <span style="color:var(--muted);font-size:12px">ID DISPOSITIVO</span>
            <span style="font-family:monospace;font-size:11px;color:var(--muted)">${d.id.slice(0,8)}...</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
            <span style="color:var(--muted);font-size:12px">UPTIME</span>
            <span style="font-weight:600;color:var(--a1)">${d.uptime_seconds ? Math.floor(d.uptime_seconds/3600) + 'h ' + Math.floor((d.uptime_seconds%3600)/60) + 'm' : '0h'}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:8px 0">
            <span style="color:var(--muted);font-size:12px">ÚLTIMA CONEXIÓN</span>
            <span style="font-size:12px">${lastSeen ? lastSeen.toLocaleString('es-ES', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : 'Nunca'}</span>
          </div>
        </div>
      </div>
      
      ${d.user_name ? `
        <div class="card">
          <div class="card-title">Usuario actual</div>
          <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg);border-radius:8px;border-left:3px solid var(--success)">
            <div style="font-size:28px">👤</div>
            <div>
              <div style="font-weight:600;font-size:14px">${d.user_name}</div>
              <div style="font-size:11px;color:var(--muted)">${d.user_role || 'Sin rol'}</div>
            </div>
          </div>
        </div>
      ` : `
        <div class="card" style="text-align:center;padding:32px;color:var(--muted)">
          <div style="font-size:40px;opacity:.3;margin-bottom:8px">👤</div>
          <div style="font-size:13px">Sin usuario activo</div>
        </div>
      `}
    `;
  }
  
  else if (tab === 'stats') {
    content.innerHTML = `
      <div style="text-align:center;padding:40px;color:var(--muted)">
        <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--a1);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px"></div>
        <div style="font-size:13px">Cargando estadísticas...</div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    `;
    loadDeviceStats(d);
  }
  
  else if (tab === 'test') {
    content.innerHTML = `
      <div class="card mb16">

async function loadDeviceStats(device) {
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  
  const content = document.getElementById('device-panel-content');
  
  try {
    // Si el dispositivo no tiene pos_id, mostrar mensaje
    if (!device.pos_id) {
      content.innerHTML = `
        <div class="card" style="text-align:center;padding:40px">
          <div style="font-size:48px;opacity:.3;margin-bottom:12px">⚠️</div>
          <div style="font-size:15px;font-weight:600;margin-bottom:8px">Sin POS ID asignado</div>
          <div style="font-size:13px;color:var(--muted);line-height:1.6;max-width:300px;margin:0 auto;margin-bottom:20px">
            Para ver estadísticas, asigna un <strong>POS ID</strong> en la pestaña Editar.
          </div>
          <button class="btn btn-p" onclick="switchDeviceTab('edit')">✏️ Asignar POS ID</button>
        </div>
      `;
      return;
    }
    
    // Cargar transacciones filtradas por pos_id
    const { data: txs, error } = await _sb
      .from('rfid_transactions')
      .select('*')
      .eq('pos_id', device.pos_id)
      .gte('created_at', hoy.toISOString())
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    const transactions = txs || [];
    
    // Renderizar según tipo
    if (device.type === 'valid') {
      renderValidStats(transactions, device);
    } else if (device.type === 'kiosk') {
      renderKioskStats(transactions, device);
    } else if (device.type === 'register') {
      renderRegisterStats(transactions, device);
    } else {
      renderGenericStats(transactions, device);
    }
    
  } catch (error) {
    console.error('Error cargando estadísticas:', error);
    content.innerHTML = `
      <div class="card" style="text-align:center;padding:40px">
        <div style="font-size:48px;margin-bottom:12px">⚠️</div>
        <div style="color:var(--danger);margin-bottom:8px">Error cargando estadísticas</div>
        <div style="font-size:12px;color:var(--muted);font-family:monospace;background:var(--bg);padding:10px;border-radius:6px">${error.message}</div>
      </div>
    `;
  }
}

function renderValidStats(txs, device) {

  const totalRecargado = recargas.reduce((s, t) => s + parseFloat(t.amount || 0), 0);
  const totalVendido = ventas.reduce((s, t) => s + Math.abs(parseFloat(t.amount || 0)), 0);
  
  const content = document.getElementById('device-panel-content');
  content.innerHTML = `
    <div class="g2 mb16">
      <div class="stat">
        <div class="stat-lbl">Recargas hoy</div>
        <div class="stat-val" style="color:var(--success);font-size:20px">${fmt(totalRecargado)}€</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">${recargas.length} operaciones</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Ventas hoy</div>
        <div class="stat-val" style="color:var(--a2);font-size:20px">${fmt(totalVendido)}€</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">${ventas.length} transacciones</div>
      </div>
    </div>
    
    <div class="card mb16">
      <div class="card-title">Actividad por horas</div>
      <canvas id="stats-chart" height="180"></canvas>
    </div>
    
    <div class="card">
      <div class="card-title">Últimas transacciones</div>
      ${txs.length === 0 ? '<div style="color:var(--muted);padding:20px;text-align:center">Sin transacciones hoy</div>' : `
        <div style="max-height:200px;overflow-y:auto">
          ${txs.slice(0, 10).map(t => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">
              <div>
                <div style="font-size:12px;font-weight:500">${t.description || '—'}</div>
                <div style="font-size:10px;color:var(--muted)">${new Date(t.created_at).toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'})}</div>
              </div>
              <div style="font-weight:600;color:${t.amount >= 0 ? 'var(--success)' : 'var(--danger)'}">
                ${t.amount >= 0 ? '+' : ''}${fmt(t.amount)}€

function renderGenericStats(txs, device) {

  content.innerHTML = `

      <div style="font-size:48px;opacity:.3;margin-bottom:12px">📊</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px">Sin estadísticas disponibles</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6;max-width:300px;margin:0 auto">
        ${txs.length} transacciones registradas hoy
      </div>
    </div>
  `;
}

function createHourlyChart(txs) {
  // Agrupar por hora
  const hourly = Array(24).fill(0);
  txs.forEach(t => {
    const hour = new Date(t.created_at).getHours();
    hourly[hour] += Math.abs(parseFloat(t.amount || 0));
  });
  
  const ctx = document.getElementById('stats-chart');
  if (!ctx) return;
  
  if (_statsChart) {
    _statsChart.destroy();
  }
  
  _statsChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Array.from({length: 24}, (_, i) => i + 'h'),
      datasets: [{
        label: 'Importe (€)',
        data: hourly,
        backgroundColor: 'rgba(200, 255, 0, 0.5)',
        borderColor: 'rgba(200, 255, 0, 1)',
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { color: '#60607a' },
          grid: { color: '#1c1c2e' }
        },
        x: {
          ticks: { color: '#60607a' },
          grid: { display: false }
        }
      }
    }
  });
}

${isOnline ? '✅ Dispositivo responde correctamente' : '⚠️  Dispositivo sin conexión reciente'}`;

async function saveDeviceEdit(deviceId) {
  const name = document.getElementById('edit-device-name').value.trim();
  const location = document.getElementById('edit-device-location').value.trim();
  const type = document.getElementById('edit-device-type').value;
  const url = document.getElementById('edit-device-url').value.trim();
  const pos_id = document.getElementById('edit-device-pos-id').value.trim();
  
  if (!name) {
    toast('⚠️ El nombre es obligatorio');
    return;
  }
  
  try {
    const { error } = await _sb
      .from('control_devices')
      .update({
        name,
        location: location || null,
        type,
        url: url || null,
        pos_id: pos_id || null
      })
      .eq('id', deviceId);
    
    if (error) throw error;
    
    toast('✅ Dispositivo actualizado correctamente');
    
    _currentDevice.name = name;
    _currentDevice.location = location;
    _currentDevice.type = type;
    _currentDevice.url = url;
    _currentDevice.pos_id = pos_id;
    
    const tipo = DEVICE_TYPES[type] || {label: type, icon: '📱'};
    document.getElementById('dp-device-name').textContent = name || tipo.label;
    document.getElementById('dp-device-type').textContent = location || 'Sin ubicación';
    
    if (currentPage === 'dispositivos') {
      renderDispositivos(document.getElementById('page-content'));
    }
    
  } catch (error) {
    console.error('Error actualizando dispositivo:', error);
    toast('❌ Error: ' + error.message);
  }
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  err.style.display='none';
  if(!email||!pass){err.textContent='Introduce email y contraseña';err.style.display='block';return;}
  try{
    const{data,error}=await _sb.auth.signInWithPassword({email,password:pass});
    if(error) throw error;
    
    const query1 = await _sb.from('empleados').select('*').eq('auth_user_id',data.user.id).single();
    let p = query1.data;
    if(!p){
      const query2 = await _sb.from('empleados').select('*').eq('email', email).single();
      p = query2.data;
    }
    
    if(!p||p.role!=='superadmin'){
      err.textContent='⛔ Acceso denegado. Solo SuperAdmin de InOut Media.';
      err.style.display='block';
      await _sb.auth.signOut(); return;
    }
    
    currentUser=data.user;
    userProfile={
      nombre:p.nombre,
      role:p.role,
      email:p.email,
      id:p.id,
      _sbId:p.id,
      organization_id:p.organization_id,
      organization:null
    };
    enterApp();
  }catch(e){
    err.textContent=e.message==='Invalid login credentials'?'Email o contraseña incorrectos':e.message;
    err.style.display='block';
  }
}
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogout(){
  await _sb.auth.signOut();currentUser=null;userProfile=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

async function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-user').textContent=userProfile.nombre;
  
  document.getElementById('topbar-role').textContent='SUPERADMIN';
  document.getElementById('topbar-role').style.color='#000';
  document.getElementById('topbar-role').style.background='var(--a1)';
  
  document.getElementById('s-user-info').textContent=userProfile.nombre+' · InOut Media';
  
  buildNav();
  await Promise.all([cargarEmpleados(),cargarEventos()]);
  navigate('dashboard');
}

async function cargarEmpleados(){
  const{data}=await _sb.from('empleados').select('*, organizations(nombre)');
  _empleados=(data||[]).map(e=>({
    ...e,
    organization_name:e.organizations?.nombre||null
  }));
}
async function cargarEventos(){
  const{data}=await _sb.from('events').select('*').order('fecha_inicio',{ascending:false}).limit(20);
  _eventos=(data||[]);
}

function buildNav(){
  document.getElementById('nav-items').innerHTML=NAV.map(i=>
    i.sec?`<div class="nav-sec">${i.sec}</div>`
    :`<div class="nav-item" id="nav-${i.key}" onclick="navigate('${i.key}')"><span class="nav-icon">${i.icon}</span>${i.label}</div>`
  ).join('');
}

function navigate(page){
  if(currentPage === 'dispositivos' && _dispositivosInterval){
    clearInterval(_dispositivosInterval);
    _dispositivosInterval = null;
  }
  
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  document.getElementById('topbar-title').textContent=TITLES[page]||page;
  const pc=document.getElementById('page-content');
  ({dashboard:renderDashboard,
    dispositivos:renderDispositivos,
    organizaciones:renderOrganizaciones,
    empleados:renderEmpleados,
    eventos:renderEventos,
    pulseras:renderPulseras,
    fichajes:renderFichajes,
    informes:renderInformes,
    transacciones:renderTransacciones
  }[page]||renderDashboard)(pc);
}

      _sb.from('rfid_wristbands').select('id,status,balance'),

async function renderDispositivos(pc){
  if (_dispositivosInterval) {
    clearInterval(_dispositivosInterval);
    _dispositivosInterval = null;
  }
  
  pc.innerHTML=`<div style="color:var(--muted);padding:20px">Cargando dispositivos…</div>`;
  
  async function cargarYMostrarDispositivos() {
    let devices=[];
    try{
      const{data:devs,error}=await _sb.from('control_devices')
        .select('*')
        .order('last_seen',{ascending:false});
      if(error){
        console.warn('Error cargando dispositivos:',error);
        pc.innerHTML=`
          <div class="card" style="text-align:center;padding:40px">
            <div style="font-size:40px;margin-bottom:12px">⚠️</div>
            <div style="color:var(--muted);margin-bottom:16px">No se pudo cargar la tabla control_devices</div>
            <div style="font-size:12px;color:var(--muted);max-width:500px;margin:0 auto;line-height:1.6">
              <strong>Posibles causas:</strong><br>
              • La tabla no existe en Supabase<br>
              • Falta configurar RLS (Row Level Security)<br>
              • No tienes permisos para leer la tabla
            </div>
            <button class="btn btn-p" style="margin-top:20px" onclick="window.open('https://supabase.com/dashboard/project/raoxkjnwrccoxjcipfpv/editor','_blank')">
              📝 Abrir Supabase SQL Editor
            </button>
          </div>`;
        return;
      }
      devices=devs||[];
    }catch(e){
      console.error('Error:', e);
      pc.innerHTML=`<div class="card" style="text-align:center;padding:40px;color:var(--danger)">Error: ${e.message}</div>`;
      return;
    }

    const onlineCount = devices.filter(d => {
      const lastSeen = d.last_seen ? new Date(d.last_seen) : null;
      return lastSeen && (Date.now() - lastSeen.getTime()) < 300000;
    }).length;
    
    const byType = {
      valid: devices.filter(d => d.type === 'valid'),
      kiosk: devices.filter(d => d.type === 'kiosk'),
      register: devices.filter(d => d.type === 'register'),
      control: devices.filter(d => d.type === 'control'),
      staff: devices.filter(d => d.type === 'staff'),
    };

    pc.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-family:Syne;font-size:20px;font-weight:700">${devices.length} dispositivos registrados</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px">
            <span style="color:var(--success)">●</span> ${onlineCount} online
            <span style="margin-left:12px;color:var(--muted)">●</span> ${devices.length - onlineCount} offline
            <span style="margin-left:12px;color:var(--a3)">↻</span> Auto-refresh 30s
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-g" onclick="renderDispositivos(document.getElementById('page-content'))">↺ Refrescar ahora</button>
        </div>
      </div>

      ${!devices.length ? `
        <div class="card" style="text-align:center;padding:40px">
          <div style="font-size:40px;margin-bottom:12px">📱</div>
          <div style="color:var(--muted);margin-bottom:16px">No hay dispositivos registrados aún.</div>
          <div style="font-size:12px;color:var(--muted);max-width:500px;margin:0 auto;line-height:1.6;margin-bottom:20px">
            Los dispositivos se registran automáticamente cuando abres cualquier app con el sistema de heartbeat integrado.
          </div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-p" onclick="window.open('https://inout-valid.vercel.app','_blank')">📡 Abrir inout-valid</button>
            <button class="btn btn-p" onclick="window.open('https://inout-kiosk.vercel.app','_blank')">🎟️ Abrir inout-kiosk</button>
            <button class="btn btn-p" onclick="window.open('https://inout-register.vercel.app','_blank')">📝 Abrir inout-register</button>
          </div>
        </div>`
      : `
        ${Object.entries(byType).filter(([type, devs]) => devs.length > 0).map(([type, devs]) => `
          <div class="card mb16">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">
              <div style="font-size:24px">${DEVICE_TYPES[type]?.icon || '📱'}</div>
              <div>
                <div style="font-family:Syne;font-weight:700;font-size:15px">${DEVICE_TYPES[type]?.label || type}</div>
                <div style="font-size:11px;color:var(--muted)">${devs.length} dispositivo${devs.length !== 1 ? 's' : ''}</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
              ${devs.map(d => renderDeviceCard(d)).join('')}
            </div>
          </div>
        `).join('')}
      `}
    `;
  }
  
  await cargarYMostrarDispositivos();
  _dispositivosInterval = setInterval(cargarYMostrarDispositivos, 30000);
}

function renderDeviceCard(d) {
  const tipo = DEVICE_TYPES[d.type] || {label: d.type, icon: '📱', color: 'var(--muted)', url: '#'};
  const lastSeen = d.last_seen ? new Date(d.last_seen) : null;
  const isOnline = lastSeen && (Date.now() - lastSeen.getTime()) < 300000;
  const lastSeenStr = lastSeen 
    ? lastSeen.toLocaleString('es-ES', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})
    : 'Nunca';

  const uptimeSeconds = d.uptime_seconds || 0;
  const uptimeHours = Math.floor(uptimeSeconds / 3600);
  const uptimeStr = uptimeHours > 0 
    ? `${uptimeHours}h ${Math.floor((uptimeSeconds % 3600) / 60)}m`
    : uptimeSeconds >= 60 
      ? `${Math.floor(uptimeSeconds / 60)}m`
      : `${uptimeSeconds}s`;

  return `
    <div class="device-card ${isOnline ? 'online' : 'offline'}">
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:10px">
        <div style="flex:1;min-width:0">
          <div style="font-family:Syne;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px">
            ${d.name || tipo.label}
          </div>
          <div style="font-size:10px;color:var(--muted)">${d.location || 'Sin ubicación'}</div>
        </div>
        <div class="device-status ${isOnline ? 'on' : 'off'}"></div>
      </div>

      ${d.user_name ? `
        <div style="padding:8px;background:var(--bg);border-radius:6px;margin-bottom:10px;border-left:2px solid ${isOnline ? 'var(--success)' : 'var(--muted)'}">
          <div style="font-size:11px;font-weight:600;margin-bottom:2px">${d.user_name}</div>
          <div style="font-size:10px;color:var(--muted)">${d.user_role || '—'}</div>
        </div>
      ` : ''}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;font-size:11px">
        <div>
          <div style="color:var(--muted);font-size:9px;margin-bottom:2px">UPTIME</div>
          <div style="font-weight:600;color:var(--a1)">${uptimeStr}</div>
        </div>
        <div>
          <div style="color:var(--muted);font-size:9px;margin-bottom:2px">ÚLTIMA CONN.</div>
          <div style="font-weight:500">${lastSeenStr.split(' ')[1] || lastSeenStr}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px">
        <button class="btn btn-p" style="padding:6px 10px;font-size:11px" onclick="window.open('${d.url || tipo.url}','_blank')">
          ↗️ Abrir
        </button>
        <button class="btn btn-g" style="padding:6px 10px;font-size:11px" onclick='openDevicePanel(${JSON.stringify(d).replace(/'/g, "\\'")})'> 
          📋 Ver
        </button>
        <button class="btn btn-danger" style="padding:6px 10px;font-size:11px" onclick="eliminarDispositivo('${d.id}')">
          ✕
        </button>
      </div>
    </div>
  `;
}

async function eliminarDispositivo(id){
  if(!confirm('¿Eliminar este dispositivo del registro?')) return;
  const{error}=await _sb.from('control_devices').delete().eq('id',id);
  if(error){toast('Error: '+error.message);return;}
  toast('Dispositivo eliminado ✓');
  renderDispositivos(document.getElementById('page-content'));
}
